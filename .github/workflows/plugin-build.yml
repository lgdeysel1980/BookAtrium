name: Plugin build

# Reusable CI for BookAtrium Plugin API 2.0 packages (BookAtrium.PluginContracts).
#
# jobs:
#   plugin:
#     uses: OWNER/REPO/.github/workflows/plugin-build.yml@main
#     with:
#       project: path/to/Plugin.csproj
#       test-project: path/to/Plugin.Tests.csproj   # optional

on:
  workflow_call:
    inputs:
      project:
        description: Path to the plugin .csproj
        required: true
        type: string
      test-project:
        description: Optional path to a test .csproj
        required: false
        type: string
        default: ""
      configuration:
        description: Build configuration
        required: false
        type: string
        default: Release
      dotnet-version:
        description: .NET SDK version
        required: false
        type: string
        default: "8.0.x"
      pack-output:
        description: Directory for .bookplugin output
        required: false
        type: string
        default: artifacts

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling plugin repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
          path: plugin-src

      - name: Checkout public tooling repository
        uses: actions/checkout@v4
        with:
          repository: lgdeysel1980/BookAtrium
          ref: ${{ github.workflow_sha }}
          path: tooling

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Restore public CLI
        run: dotnet restore "$GITHUB_WORKSPACE/tooling/BookAtrium.PluginCli/BookAtrium.PluginCli.csproj"

      - name: Restore plugin from NuGet.org
        run: dotnet restore "$GITHUB_WORKSPACE/plugin-src/${{ inputs.project }}"

      - name: Restore test project
        if: ${{ inputs.test-project != '' }}
        run: dotnet restore "$GITHUB_WORKSPACE/plugin-src/${{ inputs.test-project }}"

      - name: Build plugin release
        run: dotnet build "$GITHUB_WORKSPACE/plugin-src/${{ inputs.project }}" -c ${{ inputs.configuration }} --no-restore

      - name: Build public BookAtrium.PluginCli
        run: dotnet build "$GITHUB_WORKSPACE/tooling/BookAtrium.PluginCli/BookAtrium.PluginCli.csproj" -c ${{ inputs.configuration }} --no-restore

      - name: Run test project
        if: ${{ inputs.test-project != '' }}
        run: dotnet test "$GITHUB_WORKSPACE/plugin-src/${{ inputs.test-project }}" -c ${{ inputs.configuration }} --no-restore --verbosity normal

      - name: Validate plugin with public CLI
        run: |
          set -euo pipefail
          cli="$GITHUB_WORKSPACE/tooling/BookAtrium.PluginCli/bin/${{ inputs.configuration }}/net8.0/bookatrium-plugin.dll"
          dotnet "$cli" validate --project "$GITHUB_WORKSPACE/plugin-src/${{ inputs.project }}"

      - name: Pack plugin with public CLI
        run: |
          set -euo pipefail
          out="$GITHUB_WORKSPACE/${{ inputs.pack-output }}"
          rm -rf "$out"
          mkdir -p "$out"
          cli="$GITHUB_WORKSPACE/tooling/BookAtrium.PluginCli/bin/${{ inputs.configuration }}/net8.0/bookatrium-plugin.dll"
          dotnet "$cli" pack --project "$GITHUB_WORKSPACE/plugin-src/${{ inputs.project }}" --out "$out"

          bookplugin_count=$(find "$out" -maxdepth 1 -type f -name '*.bookplugin' | wc -l)
          checksum_count=$(find "$out" -maxdepth 1 -type f -name '*.sha256' | wc -l)

          if [ "$bookplugin_count" -ne 1 ]; then
            echo "Expected exactly one .bookplugin artifact, found $bookplugin_count" >&2
            exit 1
          fi

          if [ "$checksum_count" -ne 1 ]; then
            echo "Expected exactly one .sha256 artifact, found $checksum_count" >&2
            exit 1
          fi

          package=$(find "$out" -maxdepth 1 -type f -name '*.bookplugin' | head -n 1)
          checksum=$(find "$out" -maxdepth 1 -type f -name '*.sha256' | head -n 1)

          if [ ! -s "$package" ]; then
            echo "Pack output is missing a real .bookplugin" >&2
            exit 1
          fi

          if [ ! -s "$checksum" ]; then
            echo "Pack output is missing a real .sha256" >&2
            exit 1
          fi

          cd "$out"
          sha256sum --check "$(basename "$checksum")"
          echo "Checksum verified: $(basename "$checksum")"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: |
            ${{ inputs.pack-output }}/*.bookplugin
            ${{ inputs.pack-output }}/*.sha256
          if-no-files-found: error
