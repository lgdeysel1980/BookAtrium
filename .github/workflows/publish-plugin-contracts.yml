name: Publish PluginContracts

# Packs BookAtrium.PluginContracts and optionally pushes to NuGet.org.
# Requires repository secret NUGET_API_KEY for the push job.
#
# Recommended: run on an annotated tag such as plugincontracts-v2.0.0
# or via workflow_dispatch after reviewing the pack artifact.

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push the packed nupkg to NuGet.org
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "plugincontracts-v*"

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Pack
        run: |
          dotnet pack BookAtrium.PluginContracts/BookAtrium.PluginContracts.csproj \
            -c Release \
            -o artifacts/nuget \
            --nologo
      - name: Upload nupkg
        uses: actions/upload-artifact@v4
        with:
          name: BookAtrium.PluginContracts
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

  push:
    needs: pack
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.push == true) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/plugincontracts-v'))
    runs-on: ubuntu-latest
    environment: nuget-publish
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: BookAtrium.PluginContracts
          path: artifacts/nuget
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not configured"
            exit 1
          fi
          dotnet nuget push artifacts/nuget/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
