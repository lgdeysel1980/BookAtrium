name: Publish PluginContracts

# Packs BookAtrium.PluginContracts and optionally pushes to NuGet.org
# via NuGet.org Trusted Publishing (GitHub OIDC). No stored API key.
#
# Trusted Publishing policy (nuget.org):
#   Owner: LoganG
#   Repository: lgdeysel1980/BookAtrium
#   Workflow: publish-plugin-contracts.yml
#   Environment: (blank)
#
# Recommended: run on an annotated tag such as plugincontracts-v2.0.1
# or via workflow_dispatch after reviewing the pack artifact.

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push the packed nupkg to NuGet.org
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "plugincontracts-v*"

permissions:
  contents: read
  id-token: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Pack
        run: |
          dotnet pack BookAtrium.PluginContracts/BookAtrium.PluginContracts.csproj \
            -c Release \
            -o artifacts/nuget \
            --nologo
      - name: Upload nupkg
        uses: actions/upload-artifact@v4
        with:
          name: BookAtrium.PluginContracts
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

  push:
    needs: pack
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.push == true) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/plugincontracts-v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: BookAtrium.PluginContracts
          path: artifacts/nuget
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: LoganG
      - name: Push to NuGet.org
        run: |
          dotnet nuget push artifacts/nuget/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
